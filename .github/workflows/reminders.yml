name: Send due reminders

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check-due:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder check
        run: |
          curl -sSf -X POST "https://fuckadhd.vercel.app/api/check-due" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}\n"
